# Internship-catalog CI + self-healing daily refresh.
#
#   • validate (push / PR): fast, deterministic — seed format/schema, duplicate
#     detection, and the DB save→load round-trip. NO network link-liveness gate,
#     so a listing that dies naturally between refreshes never blocks a push.
#     Developer-introduced breakage (bad shapes, dupes) still fails the merge.
#
#   • refresh (daily schedule / manual): runs server/refresh-catalog.js, which
#     retires HTTP-dead listings (LLM double-checked when the key is set) and
#     patches changed deadlines into seeds/auto-refresh.json, re-validates, and
#     opens a PR with the diff. A run that self-heals is GREEN — no more daily
#     red X on naturally-expired postings.
name: Validate Catalog

on:
  push:
    paths:
      - 'editor/**'
  pull_request:
    paths:
      - 'editor/**'
  # Daily self-healing refresh (06:00 UTC).
  schedule:
    - cron: '0 6 * * *'
  workflow_dispatch:

jobs:
  # ── Fast structural validation on every push / PR ────────────────────
  validate:
    if: ${{ github.event_name == 'push' || github.event_name == 'pull_request' }}
    runs-on: ubuntu-latest
    permissions:
      contents: read
    defaults:
      run:
        working-directory: editor
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: editor/package-lock.json
      - name: Install dependencies
        run: |
          if [ -f package-lock.json ]; then npm ci; else npm install; fi
      - name: Validate catalog (format + schema + DB round-trip)
        run: npm run validate:catalog

  # ── Self-healing daily refresh → auto-PR ─────────────────────────────
  refresh:
    if: ${{ github.event_name == 'schedule' || github.event_name == 'workflow_dispatch' }}
    runs-on: ubuntu-latest
    permissions:
      contents: write        # commit the refreshed overlay to a PR branch
      pull-requests: write    # open/update the refresh PR
    env:
      # Enables LLM double-check of dead listings + deadline lookups. The script
      # degrades to HTTP-only liveness when this is empty, so the job still runs.
      OPENROUTER_API_KEY: ${{ secrets.OPENROUTER_API_KEY }}
    defaults:
      run:
        working-directory: editor
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: editor/package-lock.json
      - name: Install dependencies
        run: |
          if [ -f package-lock.json ]; then npm ci; else npm install; fi

      # Retire HTTP-dead listings + refresh deadlines into seeds/auto-refresh.json.
      # Writes a step-summary and sets `changed` for the PR step. Exits 0 on heal.
      - name: Refresh catalog (retire dead + update deadlines)
        id: refresh
        run: npm run refresh:catalog

      # Prove the healed catalog still validates before proposing it.
      - name: Re-validate healed catalog
        run: npm run validate:catalog

      # Open (or update) a single PR with the overlay diff. No-op when nothing changed.
      - name: Open catalog-refresh PR
        if: ${{ steps.refresh.outputs.changed == 'true' }}
        uses: peter-evans/create-pull-request@v6
        with:
          add-paths: editor/server/seeds/auto-refresh.json
          branch: bot/catalog-refresh
          base: main
          commit-message: "chore(catalog): daily auto-refresh (retire dead + update deadlines)"
          title: "chore(catalog): daily auto-refresh"
          body: |
            Automated daily catalog refresh — retires HTTP-dead listings (LLM double-checked
            when the OPENROUTER key is set) and patches changed deadlines.

            Only `editor/server/seeds/auto-refresh.json` (the machine-owned overlay) changes;
            seed arrays are untouched and provenance is kept in the JSON. See the run's
            **Summary** for the exact retirements/updates.
          labels: catalog-refresh
          delete-branch: false
